name: Go API CI/CD

on:
  push:
    branches: [main]
    paths:
      - "showup-api/**"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [main]
    paths:
      - "showup-api/**"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: showup-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test ./...

  build:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service showup-api
